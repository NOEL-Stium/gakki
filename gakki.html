<script>
 const btnC0  = document.getElementById('btnC0');
  const seC0   = document.getElementById('seC0');
        seC0.playbackRate = (Math.sqrt(1.5))**(-6)*4;
        seC0.preservesPitch = false;
        seC0.loop = true;

  // 押した瞬間に再生開始
  btnC0.addEventListener('mousedown', async () => {
    try {
      await seC0.play();
    } catch (e) {
      console.error(e);
    }
  });

  // 離したら停止
  const stopC0 = () => {
    seC0.pause();
    seC0.currentTime = 0;
  };
  btnC0.addEventListener('mouseup', stopC0);
  btnC0.addEventListener('mouseleave', stopC0); // 押したまま外に出たとき用
  btnC0.addEventListener('touchstart', () => seC0.play());
  btnC0.addEventListener('touchend',   stopC0);
</script>

<script>
 const btnA0  = document.getElementById('btnA0');
  const seA0   = document.getElementById('seA0');
        seA0.playbackRate = (Math.sqrt(1.5))**(-6)*0.5;
        seA0.preservesPitch = false;
        seA0.loop = true;

  // 押した瞬間に再生開始
  btnA0.addEventListener('mousedown', async () => {
    try {
      await seA0.play();
    } catch (e) {
      console.error(e);
    }
  });

  // 離したら停止
  const stopA0 = () => {
    seA0.pause();
    seA0.currentTime = 0;
  };
  btnA0.addEventListener('mouseup', stopA0);
  btnA0.addEventListener('mouseleave', stopA0); // 押したまま外に出たとき用
  btnA0.addEventListener('touchstart', () => seA0.play());
  btnA0.addEventListener('touchend',   stopA0);
</script>
