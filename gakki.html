<script>
 const btnB0  = document.getElementById('btnB0');
  const seB0   = document.getElementById('seB0');
        seB0.playbackRate = (Math.sqrt(1.5))**(-6)*2;
        seB0.preservesPitch = false;
        seB0.loop = true;

  // 押した瞬間に再生開始
  btnB0.addEventListener('mousedown', async () => {
    try {
      await seB0.play();
    } catch (e) {
      console.error(e);
    }
  });

  // 離したら停止
  const stopB0 = () => {
    seB0.pause();
    seB0.currentTime = 0;
  };
  btnB0.addEventListener('mouseup', stopB0);
  btnB0.addEventListener('mouseleave', stopB0); // 押したまま外に出たとき用
  btnB0.addEventListener('touchstart', () => seB0.play());
  btnB0.addEventListener('touchend',   stopB0);
</script>
